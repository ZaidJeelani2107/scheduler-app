<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="300" height="380" viewBox="0 0 300 380" xmlns="http://www.w3.org/2000/svg">
    <!-- Ring pegs -->
    <rect x="107" y="58" width="17" height="65" rx="9" fill="white"/>
    <rect x="176" y="58" width="17" height="65" rx="9" fill="white"/>
    <!-- Calendar border -->
    <rect x="75" y="100" width="150" height="175" rx="18" fill="none" stroke="white" stroke-width="14"/>
    <!-- Header divider -->
    <line x1="75" y1="160" x2="225" y2="160" stroke="white" stroke-width="10"/>
    <!-- Grid dots: 3 cols × 2 rows -->
    <circle cx="103" cy="195" r="11" fill="white"/>
    <circle cx="150" cy="195" r="11" fill="white"/>
    <circle cx="197" cy="195" r="11" fill="white"/>
    <circle cx="103" cy="248" r="11" fill="white"/>
    <circle cx="150" cy="248" r="11" fill="white"/>
    <!-- Today dot (slightly larger) -->
    <circle cx="197" cy="248" r="16" fill="white"/>
    <!-- App name -->
    <text x="150" y="330" font-family="sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">Scheduler</text>
</svg>
